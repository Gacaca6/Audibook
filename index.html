<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Audibook - Gamified Audiobook Creator</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#58cc02" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />

    <!-- iOS Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Audibook" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <style>
      /* Splash screen — inlined so it paints on the very first frame,
         before any JavaScript or bundle has loaded. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(165deg, #6ede16 0%, #58cc02 45%, #3d8f02 100%);
        font-family: ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        transition: opacity 0.55s ease, transform 0.55s ease;
      }
      #splash.splash-out {
        opacity: 0;
        transform: scale(1.06);
        pointer-events: none;
      }

      /* Sound rings pulsing out from behind the badge */
      .splash-ring {
        position: absolute;
        width: 120px;
        height: 120px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        animation: splash-ripple 2.6s cubic-bezier(0.2, 0.6, 0.3, 1) infinite;
      }
      .splash-ring:nth-child(2) { animation-delay: 0.5s; }
      .splash-ring:nth-child(3) { animation-delay: 1s; }
      @keyframes splash-ripple {
        0%   { transform: scale(0.85); opacity: 0.55; }
        100% { transform: scale(3.2);  opacity: 0; }
      }

      .splash-badge {
        position: relative;
        width: 116px;
        height: 116px;
        border-radius: 32px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 62px;
        line-height: 1;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
        animation: splash-pop 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                   splash-float 3s ease-in-out 0.75s infinite;
      }
      @keyframes splash-pop {
        0%   { transform: scale(0.3) rotate(-14deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-9px); }
      }

      .splash-title {
        margin-top: 26px;
        color: #fff;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.6px;
        animation: splash-rise 0.6s ease-out 0.3s both;
      }
      .splash-tagline {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.3px;
        animation: splash-rise 0.6s ease-out 0.48s both;
      }
      @keyframes splash-rise {
        from { transform: translateY(14px); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
      }

      /* Equalizer bars — reads as "audio" without needing an image */
      .splash-bars {
        margin-top: 30px;
        display: flex;
        align-items: flex-end;
        gap: 5px;
        height: 26px;
        animation: splash-rise 0.6s ease-out 0.66s both;
      }
      .splash-bars i {
        display: block;
        width: 5px;
        height: 100%;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.92);
        transform-origin: bottom;
        animation: splash-eq 1s ease-in-out infinite;
      }
      .splash-bars i:nth-child(1) { animation-delay: 0s;    }
      .splash-bars i:nth-child(2) { animation-delay: 0.15s; }
      .splash-bars i:nth-child(3) { animation-delay: 0.3s;  }
      .splash-bars i:nth-child(4) { animation-delay: 0.45s; }
      .splash-bars i:nth-child(5) { animation-delay: 0.6s;  }
      @keyframes splash-eq {
        0%, 100% { transform: scaleY(0.28); opacity: 0.75; }
        50%      { transform: scaleY(1);    opacity: 1; }
      }

      /* Respect users who ask for less motion */
      @media (prefers-reduced-motion: reduce) {
        .splash-ring, .splash-bars i { animation: none; }
        .splash-badge { animation: splash-pop 0.4s ease-out both; }
      }
    </style>
  </head>
  <body class="bg-slate-50 antialiased overflow-x-hidden selection:bg-green-100 select-none">
    <div id="splash">
      <span class="splash-ring"></span>
      <span class="splash-ring"></span>
      <span class="splash-ring"></span>
      <div class="splash-badge">🦉</div>
      <div class="splash-title">Audibook</div>
      <div class="splash-tagline">Listen. Learn. Level up.</div>
      <div class="splash-bars"><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <div id="root"></div>
    <script>
      // Stamp the paint time so the app can hold the splash long enough for
      // the intro animation to land, instead of flashing past it.
      document.getElementById('splash').dataset.shownAt = Date.now();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
