<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Audibook - Gamified Audiobook Creator</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#58cc02" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />

    <!-- iOS Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Audibook" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  </head>
  <body class="bg-slate-50 antialiased overflow-x-hidden selection:bg-green-100 select-none">
    <!-- Splash screen: renders instantly (before any JS), removed by the app once ready -->
    <div
      id="splash"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: linear-gradient(160deg, #58cc02 0%, #46a302 100%);
        transition: opacity 0.45s ease;
        font-family: ui-rounded, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      "
    >
      <div
        style="
          width: 108px;
          height: 108px;
          border-radius: 30px;
          background: rgba(255, 255, 255, 0.95);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 60px;
          box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
          animation: splash-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        "
      >
        🦉
      </div>
      <div style="color: #fff; font-size: 30px; font-weight: 800; letter-spacing: -0.5px">Audibook</div>
      <div style="color: rgba(255, 255, 255, 0.85); font-size: 13px; font-weight: 700">
        Listen. Learn. Level up.
      </div>
      <div
        style="
          margin-top: 18px;
          width: 26px;
          height: 26px;
          border: 3px solid rgba(255, 255, 255, 0.35);
          border-top-color: #fff;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        "
      ></div>
      <style>
        @keyframes splash-spin {
          to {
            transform: rotate(360deg);
          }
        }
        @keyframes splash-pop {
          from {
            transform: scale(0.6);
            opacity: 0;
          }
          to {
            transform: scale(1);
            opacity: 1;
          }
        }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
